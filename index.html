<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuoRain GUI</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Noto Sans", sans-serif;
      background: linear-gradient(to top right, #2e3192, #fcb045, #00d2ff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }
    .logo-container img {
      width: 150px;
      height: auto;
    }
    .logo-text {
      font-size: 100px;
      font-weight: 900;
      display: flex;
      align-items: center;
    }
    .logo-text .duo {
      color: white;
    }
    .logo-text .rain {
      background: linear-gradient(to right, #005bea, #002e8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .button-group {
      margin-top: 40px;
      display: flex;
      gap: 30px;
    }
    .farm-button {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: bold;
      padding: 10px 20px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
      backdrop-filter: blur(10px);
    }
    .farm-button:hover {
      background: rgba(255,255,255,0.15);
    }
    .farm-button span {
      background: linear-gradient(to right, #005bea, #002e8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .farm-button img {
      width: 24px;
      height: 24px;
    }
    .dropdown {
      margin-top: 30px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.5s ease forwards;
    }
    .dropdown h2 {
      font-size: 22px;
      margin: 0;
      background: linear-gradient(to right, #005bea, #002e8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .dropdown input {
      padding: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      width: 200px;
      text-align: center;
    }
    .dropdown button {
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #1cb0f6;
      color: white;
      cursor: pointer;
    }
    .progress-container {
      display: none;
      margin-top: 30px;
      width: 80%;
      max-width: 600px;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .progress-info {
      align-self: flex-start;
      font-size: 14px;
      color: #ffffffbb;
    }
    .progress-bar {
      width: 100%;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #005bea, #002e8a);
      transition: width 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div class="logo-container">
    <img src="https://raw.githubusercontent.com/OracleMythix/DuoRainGUI/main/assets/rain-thunder-cloud.png" alt="cloud">
    <div class="logo-text">
      <span class="duo">Duo</span><span class="rain">Rain</span>
    </div>
    <img src="https://raw.githubusercontent.com/OracleMythix/DuoRainGUI/main/assets/rain-thunder-cloud.png" alt="cloud">
  </div>

  <div class="button-group">
    <div class="farm-button" onclick="showDropdown('xp')">
      <img src="https://raw.githubusercontent.com/OracleMythix/DuoRainGUI/main/assets/xp.svg" />
      <span>XP Farm</span>
    </div>
    <div class="farm-button" onclick="showDropdown('gem')">
      <img src="https://raw.githubusercontent.com/OracleMythix/DuoRainGUI/main/assets/gems.svg" />
      <span>Gem Farm</span>
    </div>
    <div class="farm-button" onclick="showDropdown('streak')">
      <img src="https://raw.githubusercontent.com/OracleMythix/DuoRainGUI/main/assets/streak.svg" />
      <span>Streak Farm</span>
    </div>
  </div>

  <div class="dropdown" id="dropdown">
    <h2 id="question-text">How many?</h2>
    <input type="number" id="amount" placeholder="Enter amount" />
    <button onclick="startFarming()">Start</button>
  </div>

  <div class="progress-container" id="progress">
    <div class="progress-info" id="progress-info">0 loops/day at 0.0 per second</div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <script>
    let mode = "";
    function showDropdown(selectedMode) {
      mode = selectedMode;
      const dropdown = document.getElementById("dropdown");
      const question = document.getElementById("question-text");
      if (mode === "streak") {
        question.innerText = "How many days do you want to farm?";
      } else {
        question.innerText = "How many loops do you want to farm?";
      }
      dropdown.style.display = "flex";
      document.getElementById("progress").style.display = "none";
    }

    function startFarming() {
      const value = parseInt(document.getElementById("amount").value);
      const progress = document.getElementById("progress");
      const fill = document.getElementById("progress-fill");
      const info = document.getElementById("progress-info");
      document.getElementById("dropdown").style.display = "none";
      progress.style.display = "flex";

      if (window.backend && typeof window.backend.start === 'function') {
        window.backend.start(mode, value);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (typeof QWebChannel !== "undefined") {
        new QWebChannel(qt.webChannelTransport, function(channel) {
          window.backend = channel.objects.backend;

          backend.updateProgress.connect(function(current, total, rate) {
            const info = document.getElementById("progress-info");
            const fill = document.getElementById("progress-fill");
            info.innerText = `${current} ${mode === "streak" ? "days" : "loops"} at ${rate.toFixed(2)}/sec`;
            fill.style.width = `${(current / total) * 100}%`;
          });
        });
      } else {
        console.error("QWebChannel failed to load.");
      }
    });
  </script>
</body>
</html>
