<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DuoRain — Minimal Farm UI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #2e3192; --bg2: #fcb045; --bg3: #00d2ff;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.1);
}
html, body {
  margin: 0; height: 100%;
  font-family: "Inter", sans-serif;
  background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg1));
  background-size: 400% 400%;
  animation: gradientShift 22s linear infinite;
  color: white; overflow: hidden;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Screens */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
.screen.active {
  opacity: 1; pointer-events: auto;
}

/* Farm Status */
.farm-status {
  position: absolute; top: 20px; left: 20px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 6px 12px; border-radius: 10px;
  font-weight: 700; display: flex; align-items: center; gap: 8px;
  cursor: pointer; backdrop-filter: blur(8px);
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: red; /* default off */
}

/* Farm buttons */
.farm-button {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 18px 24px;
  margin: 10px;
  min-width: 160px;
  text-align: center;
  font-weight: 700;
  backdrop-filter: blur(8px);
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
}
.farm-button:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  background: rgba(255,255,255,0.12);
}

/* Input panel */
.input-panel {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 20px; border-radius: 14px;
  display: flex; flex-direction: column; gap: 14px;
  align-items: center; backdrop-filter: blur(8px);
}
.input-panel input {
  padding: 10px; border-radius: 8px;
  border: none; outline: none;
  background: rgba(255,255,255,0.12); color: white;
  font-weight: 700; width: 180px;
  text-align: center;
}
.start-btn {
  padding: 10px 18px; border-radius: 10px;
  background: linear-gradient(90deg,#1cb0f6,#006edc);
  border: none; color: white; font-weight: 800;
  cursor: pointer;
}

/* Progress bar */
.progress-bar {
  width: 240px; height: 20px;
  background: rgba(255,255,255,0.06);
  border-radius: 999px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, rgba(0,110,220,0.85), rgba(28,176,246,0.9));
  transition: width 0.4s ease;
}
</style>
</head>
<body>

<!-- Farm Menu Screen -->
<div class="screen active" id="menuScreen">
  <div class="farm-status" id="farmStatusBtn">
    Farm Status <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="farm-button" data-mode="xp">XP Farm</div>
  <div class="farm-button" data-mode="gem">Gem Farm</div>
  <div class="farm-button" data-mode="streak">Streak Farm</div>
</div>

<!-- Input Screen -->
<div class="screen" id="inputScreen">
  <div class="farm-button" id="backToMenu">← Back</div>
  <div class="input-panel">
    <input type="number" id="amount" value="10" min="1" />
    <button class="start-btn" id="startBtn">Start Farming</button>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<script>
const menuScreen = document.getElementById('menuScreen');
const inputScreen = document.getElementById('inputScreen');
const farmButtons = document.querySelectorAll('#menuScreen .farm-button');
const backToMenu = document.getElementById('backToMenu');
const startBtn = document.getElementById('startBtn');
const progressFill = document.getElementById('progressFill');
const statusDot = document.getElementById('statusDot');

let isRunning = false;
let currentFarm = null;

function updateStatusDot() {
  statusDot.style.background = isRunning ? 'limegreen' : 'red';
}

// Menu -> Input
farmButtons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentFarm = btn.dataset.mode;
    menuScreen.classList.remove('active');
    inputScreen.classList.add('active');
  });
});

// Input -> Menu
backToMenu.addEventListener('click', ()=>{
  inputScreen.classList.remove('active');
  menuScreen.classList.add('active');
  currentFarm = null;
});

// Start Farming
startBtn.addEventListener('click', ()=>{
  isRunning = true;
  updateStatusDot();
  let progress = 0;
  const timer = setInterval(()=>{
    progress += 5;
    progressFill.style.width = progress + '%';
    if(progress >= 100) {
      clearInterval(timer);
      isRunning = false;
      updateStatusDot();
    }
  }, 200);
});

updateStatusDot();
</script>
</body>
</html>
