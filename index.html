<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DuoRain — Revamped</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#2e3192; --bg2:#fcb045; --bg3:#00d2ff;
    --accent1:#005bea; --accent2:#002e8a;
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.06);
    --muted: rgba(255,255,255,0.72);
  }
  html,body{ height:100%; margin:0; }
  body{
    font-family: "Inter", "Poppins", system-ui;
    background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg1));
    background-size: 400% 400%;
    animation: gradientShift 22s linear infinite;
    display:flex;
    justify-content:center;
    color: #fff;
    min-height:100vh;
    padding:36px 18px;
    box-sizing:border-box;
  }
  @keyframes gradientShift {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }
  .shell {
    max-width:1100px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    width:100%;
  }
  .logo-row {
    display:flex;align-items:center;gap:18px;margin-top:8px;pointer-events:none;
  }
  .logo-image {
    width:118px;height:118px;flex:0 0 118px;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.35));
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    padding: 12px;
  }
  .title { display:flex; align-items:center; gap:10px; }
  .duo {
    font-family:"Poppins",sans-serif;font-size:48px;font-weight:800;color:#fff;
    text-shadow:0 8px 24px rgba(0,0,0,0.30);
  }
  .rain {
    font-family:"Poppins",sans-serif;font-size:58px;font-weight:800;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    position:relative;transform:translateY(-2px);
  }
  .rain::after{
    content:"";position:absolute;left:-50%;top:0;width:40%;height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform:skewX(-20deg);animation: shimmer 5s ease-in-out infinite;
  }
  @keyframes shimmer{ 0%{left:-50%} 50%{left:140%} 100%{left:-50%} }
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
    border-radius:22px;
    padding:28px;
    display:flex;flex-direction:column;gap:20px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 60px rgba(2,6,23,0.45);
    backdrop-filter: blur(10px);
    width:100%;
    box-sizing:border-box;
  }
  .button-group {
    display:flex;gap:18px;flex-wrap:wrap;justify-content:center;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .farm-button {
    display:flex;align-items:center;gap:12px;padding:14px 18px;
    border-radius:12px;background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.04);
    cursor:pointer;min-width:160px;justify-content:center;
    font-weight:700;letter-spacing:0.2px;
    transition: transform .18s, box-shadow .18s, background .18s;
  }
  .farm-button img{ width:26px;height:26px; }
  .farm-button:hover{ transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.40); background: rgba(255,255,255,0.06); }
  .farm-button.selected{
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 26px 70px rgba(0,0,0,0.45);
    background: linear-gradient(90deg, rgba(28,176,246,0.12), rgba(0,94,200,0.08));
  }
  .panel, .progress-area {
    opacity:0;pointer-events:none;transform: translateY(20px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .panel.visible, .progress-area.visible {
    opacity:1;pointer-events:auto;transform: translateY(0);
  }
  .panel {
    display:flex;gap:14px;align-items:center;justify-content:center;
    padding:18px;border-radius:14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.035);
  }
  .input-wrap{ position:relative; width:260px; }
  .input-wrap input{
    width:100%;padding:12px 14px 12px 48px;
    border-radius:12px;border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.06);color:white;
    font-weight:700;font-size:15px;
  }
  .input-icon{
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    width:22px; height:22px;
  }
  .start-btn {
    padding:10px 18px;border-radius:10px;border:none;
    background: linear-gradient(90deg,#1cb0f6,#006edc);
    color:white;font-weight:800;cursor:pointer;
  }
  .progress-bar {
    height:20px;width:100%;border-radius:999px;background: rgba(255,255,255,0.06);
    overflow:hidden;
  }
  .progress-fill {
    height:100%;width:0%;border-radius:999px;
    background: linear-gradient(90deg, rgba(0,110,220,0.85), rgba(28,176,246,0.9));
    transition: width 0.4s ease;
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="logo-row">
      <img class="logo-image" src="assets/rain-thunder-cloud.png">
      <div class="title"><div class="duo">Duo</div><div class="rain">Rain</div></div>
      <img class="logo-image" src="assets/rain-thunder-cloud.png">
    </div>

    <div class="card">
      <div class="button-group" id="buttonGroup">
        <div class="farm-button" data-mode="xp"><img src="assets/xp.svg">XP Farm</div>
        <div class="farm-button" data-mode="gem"><img src="assets/gems.svg">Gem Farm</div>
        <div class="farm-button" data-mode="streak"><img src="assets/streak.svg">Streak Farm</div>
      </div>

      <div class="panel" id="inputPanel">
        <div class="input-wrap">
          <img class="input-icon" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='white' viewBox='0 0 24 24'><path d='M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 14.5v-5h-2v5h2zm0-7.5V6h-2v3H11z'/></svg>">
          <input id="amount" type="number" min="1" value="10" placeholder="Enter loops / days" />
        </div>
        <button class="start-btn" id="startBtn">Start Farming</button>
      </div>

      <div class="progress-area" id="progressArea">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>
  </div>

<script>
  const buttons = document.querySelectorAll('.farm-button');
  const buttonGroup = document.getElementById('buttonGroup');
  const inputPanel = document.getElementById('inputPanel');
  const progressArea = document.getElementById('progressArea');
  const progressFill = document.getElementById('progressFill');
  let currentMode = null;

  buttons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentMode = btn.dataset.mode;
      buttons.forEach(b=>b.style.display='none');
      btn.style.display='flex';
      btn.classList.add('selected');
      inputPanel.classList.add('visible');
    });
  });

  document.getElementById('startBtn').addEventListener('click', ()=>{
    inputPanel.classList.remove('visible');
    progressArea.classList.add('visible');

    let progress = 0;
    const interval = setInterval(()=>{
      progress += 5;
      if(progress>100){ clearInterval(interval); return; }
      progressFill.style.width = progress + '%';
    }, 200);
  });
</script>
</body>
</html>
